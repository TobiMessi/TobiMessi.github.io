<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog | DevLabStudy</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        a { color: #2563eb; text-decoration: none; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="/">&larr; Wróć do Dashboardu</a>
    <h1>Wpisy z laboratorium</h1>
    
    <ul>
      {% for post in site.posts %}
        <li>
          <span style="color: #64748b;">{{ post.date | date: "%Y-%m-%d" }}</span> &raquo; 
          <a href="{{ post.url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
</body>
</html>
