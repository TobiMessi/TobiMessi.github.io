---
layout: default
title: Blog
---
<style>
    .log-link { display: flex; justify-content: space-between; text-decoration: none; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-main); transition: 0.2s; }
    .log-link:last-child { border-bottom: none; padding-bottom: 0; }
    .log-link:hover { padding-left: 8px; color: var(--accent-blue); }
</style>

<div class="card">
    <h3 style="font-size: 0.85rem; color: var(--text-muted); margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace;">[ Recent_System_Logs ]</h3>
    
    <div style="display: flex; flex-direction: column;">
        {% for post in site.posts %}
        <a href="{{ post.url }}" class="log-link">
            <span style="font-size: 0.95rem; font-weight: 600;">{{ post.title }}</span>
            <span style="color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; margin-left: 15px; font-family: 'JetBrains Mono', monospace;">[{{ post.date | date: "%d.%m.%Y" }}]</span>
        </a>
        {% endfor %}
    </div>
</div>
