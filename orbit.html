<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit™ Project | DevLabStudy</title>
    <link rel="icon" type="image/png" href="/qr-code.png?v=fixed_buttons">
    <style>
        :root {
            --bg-body: #f4f7fa; --bg-nav: #ffffff; --bg-card: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --border-color: #e2e8f0;
            --accent-purple: #4b0082; --radius: 12px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a; --bg-nav: #1e293b; --bg-card: #1e293b;
                --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: #334155;
                --accent-purple: #8b5cf6;
            }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background: var(--bg-nav); border-bottom: 1px solid var(--border-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--text-main); }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--text-muted); font-weight: 600; }
        .nav-links a.active { color: var(--accent-purple); }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .hero-orbit { text-align: center; padding: 60px 20px; background: var(--bg-card); border-radius: var(--radius); border-top: 5px solid var(--accent-purple); margin-bottom: 40px; }
        .content-card { background: var(--bg-card); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 30px; }
        footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 50px; padding: 20px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">DevLabStudy©</a>
        <div class="nav-links">
            <a href="/">Hub</a>
            <a href="/blog">Blog</a>
            <a href="/homelab">HomeLab</a>
            <a href="/orbit" class="active">Orbit™</a>
        </div>
    </nav>
    <main class="container">
        <section class="hero-orbit">
            <h1>Orbit™ Project</h1>
            <p>Next-gen management and optimization for containerized environments.</p>
        </section>
        <div class="content-card">
            <h2>About the Project</h2>
            <p>Orbit was born from the need to manage a diverse HomeLab environment efficiently, focusing on ultra-lightweight Docker images.</p>
        </div>
    </main>
    <footer><p>Orbit™ Project 2026</p></footer>
</body>
</html>
