<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DevLabStudy</title>
    
    <link rel="icon" type="image/jpeg" href="/profileIcon_g3ffyg7edeeg1.jpeg">

    <style>
        :root {
            --bg-nav: rgba(5, 5, 5, 0.85); --text-main: #f8fafc; --text-muted: #94a3b8; 
            --border-color: rgba(255, 255, 255, 0.1); --accent-blue: #3b82f6; --bg-card: #111;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; margin: 0; min-height: 100vh;
            background: #000 url('/background.png') no-repeat center center fixed; 
            background-size: cover; color: var(--text-main); overflow-x: hidden;
            line-height: 1.6;
        }

        .navbar { position: sticky; top: 0; z-index: 100; background: var(--bg-nav); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--text-main); letter-spacing: -0.5px; }
        .back-link { color: var(--accent-blue); text-decoration: none; font-weight: 600; font-size: 0.95rem;}
        .back-link:hover { text-decoration: underline; }

        .container { max-width: 800px; margin: 40px auto; padding: 40px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid var(--border-color); }
        
        .article-header { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px; }
        .article-title { font-size: 2.2rem; margin: 0 0 10px 0; line-height: 1.2; font-weight: 800; }
        .article-date { color: var(--text-muted); font-size: 0.95rem; }
        
        .article-content { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; }
        .article-content h2, .article-content h3 { margin-top: 40px; color: var(--text-main); }
        .article-content a { color: var(--accent-blue); text-decoration: none; }
        .article-content a:hover { text-decoration: underline; }
        .article-content code { background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #f8fafc; }
        .article-content pre { background: rgba(0,0,0,0.8); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; overflow-x: auto; }
        .article-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border-color); }

        footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: 50px 0 30px 0; padding-top: 20px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">DevLabStudy</a>
        <a href="/blog" class="back-link">&larr; Back to Blog</a>
    </nav>

    <main class="container">
        <header class="article-header">
            <h1 class="article-title">{{ page.title }}</h1>
            <div class="article-date">{{ page.date | date: "%B %d, %Y" }}</div>
        </header>

        <article class="article-content">
            {{ content }}
        </article>
    </main>

    <footer>
        <p>1 Gbps Fiber - Linux Mint - Orbit™ Project 2026</p>
    </footer>

</body>
</html>
