<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLabStudy | Hub</title>
    <link rel="icon" type="image/png" href="/qr-code.png">
    <style>
        :root {
            --bg-body: #050505; --bg-nav: rgba(5, 5, 5, 0.7); 
            --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6; --accent-purple: #8b5cf6; --accent-green: #10b981;
        }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* --- PERFEKCYJNY NAVBAR (Z Community po prawej) --- */
        .navbar { background: var(--bg-nav); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--text-main); letter-spacing: -0.5px; }
        
        .nav-center { flex: 2; display: flex; justify-content: center; gap: 30px; }
        .nav-center a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; transition: color 0.3s; }
        .nav-center a:hover, .nav-center a.active { color: var(--accent-blue); }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; }
        .dropdown { position: relative; display: inline-block; padding: 10px 0; }
        .dropbtn { color: var(--text-muted); font-weight: 600; font-size: 0.95rem; transition: 0.3s; cursor: pointer; }
        .dropdown:hover .dropbtn { color: var(--text-main); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; background-color: #111; min-width: 180px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; z-index: 1; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
        .dropdown:hover .dropdown-content { display: block; opacity: 1; transform: translateY(0); }
        .dropdown-content a { color: var(--text-main) !important; padding: 12px 20px; text-decoration: none; display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background: rgba(255,255,255,0.05); padding-left: 25px; }

        /* --- NOWY KONCEPT GŁÓWNEJ STRONY --- */
        .hero-container { position: relative; min-height: calc(100vh - 70px); display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Świecąca kula w tle */
        .glow-orb { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(139,92,246,0.1) 40%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; filter: blur(50px); animation: pulse 8s infinite alternate; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

        /* Szklany panel na środku */
        .glass-panel { position: relative; z-index: 1; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 60px 40px; max-width: 800px; width: 100%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .main-title { font-size: 3.5rem; font-weight: 900; margin: 0 0 20px 0; letter-spacing: -1.5px; }
        .main-title span { background: linear-gradient(135deg, #3b82f6, #8b5cf6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-desc { font-size: 1.2rem; color: var(--text-muted); line-height: 1.6; margin: 0 auto 50px auto; max-width: 600px; }

        /* 3 główne ścieżki (Duże przyciski) */
        .action-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .action-btn { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 20px 30px; border-radius: 20px; text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 1.1rem; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); flex: 1; min-width: 200px; }
        .action-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        
        .action-btn.blog:hover { border-color: var(--accent-blue); box-shadow: 0 10px 30px rgba(59,130,246,0.2); }
        .action-btn.lab:hover { border-color: var(--accent-green); box-shadow: 0 10px 30px rgba(16,185,129,0.2); }
        .action-btn.orbit:hover { border-color: var(--accent-purple); box-shadow: 0 10px 30px rgba(139,92,246,0.2); }

        .btn-icon { font-size: 1.8rem; }

        @media (max-width: 768px) { .navbar { flex-direction: column; padding: 15px; gap: 15px; } .nav-left, .nav-center, .nav-right { justify-content: center; width: 100%; } .action-links { flex-direction: column; } .glass-panel { padding: 40px 20px; } .main-title { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">DevLabStudy</a>
        </div>
        <div class="nav-center">
            <a href="/" class="active">Hub</a>
            <a href="/blog">Blog</a>
            <a href="/homelab">HomeLab</a>
            <a href="/orbit">Orbit™</a>
        </div>
        <div class="nav-right">
            <div class="dropdown">
                <span class="dropbtn">Community</span>
                <div class="dropdown-content">
                    <a href="https://github.com/DevLabStudy">GitHub <span>↗</span></a>
                    <a href="https://www.youtube.com/@devlabstudy">YouTube <span>↗</span></a>
                    <a href="https://x.com/DevLabStudy">X / Twitter <span>↗</span></a>
                    <a href="https://www.tiktok.com/@devlabstudy">TikTok <span>↗</span></a>
                    <a href="https://www.reddit.com/user/devlabstudy">Reddit <span>↗</span></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero-container">
        <div class="glow-orb"></div>
        
        <div class="glass-panel">
            <h1 class="main-title">Architecting the <span>Edge.</span></h1>
            <p class="main-desc">Self-taught infrastructure enthusiast. Pushing the boundaries of old hardware through Docker optimization and custom orchestration.</p>
            
            <div class="action-links">
                <a href="/blog" class="action-btn blog">
                    <span class="btn-icon">📚</span> Notes
                </a>
                <a href="/homelab" class="action-btn lab">
                    <span class="btn-icon">🖥️</span> Cluster
                </a>
                <a href="/orbit" class="action-btn orbit">
                    <span class="btn-icon">🚀</span> Orbit™
                </a>
            </div>
        </div>
    </main>

</body>
</html>
