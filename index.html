<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLabStudy | Hub</title>
    <link rel="icon" type="image/jpeg" href="/profileIcon_g3ffyg7edeeg1.jpeg">
    <style>
        :root {
            --bg-nav: rgba(5, 5, 5, 0.85); --text-main: #f8fafc; --text-muted: #94a3b8; 
            --border-color: rgba(255, 255, 255, 0.1); --accent-blue: #3b82f6;
        }
        
        /* TWOJE NOWE TŁO Z SERWERAMI */
        body { 
            font-family: 'Inter', -apple-system, sans-serif; margin: 0; min-height: 100vh;
            background: #000 url('/background.png') no-repeat center center fixed; 
            background-size: cover; color: var(--text-main); overflow-x: hidden;
        }

        /* Przyciemnienie obrazka, żeby tekst był czytelny */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1; }

        /* --- NOWY NAVBAR (Community z lewej, linki z prawej) --- */
        .navbar { position: sticky; top: 0; z-index: 100; background: var(--bg-nav); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; }
        
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--text-main); letter-spacing: -0.5px; }
        
        /* Rozsuwane Community po lewej */
        .dropdown { position: relative; display: inline-block; padding: 10px 0; }
        .dropbtn { color: var(--text-main); font-weight: 700; font-size: 0.95rem; cursor: pointer; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); transition: 0.3s; }
        .dropdown:hover .dropbtn { background: rgba(255,255,255,0.2); }
        .dropdown-content { display: none; position: absolute; left: 0; top: 100%; background-color: #111; min-width: 180px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; z-index: 1; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
        .dropdown:hover .dropdown-content { display: block; opacity: 1; transform: translateY(0); }
        .dropdown-content a { color: var(--text-main) !important; padding: 12px 20px; text-decoration: none; display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background: rgba(255,255,255,0.1); padding-left: 25px; }

        .nav-right { display: flex; align-items: center; gap: 25px; }
        .nav-right a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; transition: color 0.3s; }
        .nav-right a:hover, .nav-right a.active { color: var(--accent-blue); }

        /* Minimalistyczny tekst na środku */
        .hero-content { position: relative; z-index: 2; text-align: center; margin-top: 25vh; padding: 0 20px; }
        .hero-title { font-size: 4rem; font-weight: 900; margin: 0; letter-spacing: -2px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .hero-subtitle { font-size: 1.2rem; color: #cbd5e1; margin-top: 15px; font-weight: 500; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 15px; } .nav-left, .nav-right { justify-content: center; width: 100%; flex-wrap: wrap; } }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">DevLabStudy</a>
            <div class="dropdown">
                <span class="dropbtn">Community ▾</span>
                <div class="dropdown-content">
                    <a href="https://github.com/DevLabStudy">GitHub <span>↗</span></a>
                    <a href="https://www.youtube.com/@devlabstudy">YouTube <span>↗</span></a>
                    <a href="https://x.com/DevLabStudy">X / Twitter <span>↗</span></a>
                    <a href="https://www.tiktok.com/@devlabstudy">TikTok <span>↗</span></a>
                    <a href="https://www.reddit.com/user/devlabstudy">Reddit <span>↗</span></a>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/" class="active">Hub</a>
            <a href="/blog">Blog</a>
            <a href="/homelab">HomeLab</a>
            <a href="/orbit">Orbit™</a>
        </div>
    </nav>

    <main class="hero-content">
        <h1 class="hero-title">DevLab Environment</h1>
        <p class="hero-subtitle">System Administration • Docker Optimization • Edge Computing</p>
    </main>
</body>
</html>
